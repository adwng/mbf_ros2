  # === WTW Gait Parameters ===
  num_gaits: 4
  # Phase offsets per leg for each gait preset:
  #   Index 0: Trot    (diagonal pairs)
  #   Index 1: Pronk   (all in phase)
  #   Index 2: Pace    (lateral pairs)
  #   Index 3: Bound   (front/back pairs)
  theta_fl: [0.0, 0.0, 0.5, 0.0]
  theta_fr: [0.5, 0.0, 0.0, 0.0]
  theta_rl: [0.5, 0.0, 0.5, 0.5]
  theta_rr: [0.0, 0.0, 0.0, 0.5]

  # === WTW Style Parameter Ranges ===
  gait_period_range: [0.3, 0.6]
  base_height_range: [0.15, 0.24]
  foot_clearance_range: [0.04, 0.12]
  pitch_range: [-0.3, 0.3]

  # Per-press adjustment step for style parameters
  wtw_adjust_step: 0.01
  # Cooldown cycles (at control rate) between discrete gait switches
  gait_switch_cooldown: 100

  # Velocity step per key press (hold key to accumulate)
  vel_step: 0.1

  # =================================================================
  # Keyboard Mapping — every action is a single key
  # =================================================================
  # Values: single character "a"-"z", "0"-"9", or special names:
  #   "space", "enter", "escape", "up", "down", "left", "right"
  #
  key_mapping:
    # Velocity
    forward: "w"
    backward: "s"
    left: "a"
    right: "d"
    yaw_left: "q"
    yaw_right: "e"
    stop: "space"

    # FSM transitions
    getup: "0"
    passive: "p"
    locomotion: "1"
    getdown: "9"

    # Navigation mode toggle
    nav_mode: "n"

    # WTW gait switching
    gait_next: "x"
    gait_prev: "z"

    # WTW style adjustments (hold to adjust continuously)
    gait_period_up: "t"
    gait_period_down: "g"
    base_height_up: "y"
    base_height_down: "h"
    foot_clearance_up: "u"
    foot_clearance_down: "j"
    pitch_up: "i"
    pitch_down: "k"
